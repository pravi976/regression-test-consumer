name: Consumer Regression

on:
  push:
    branches: [develop, release]
  pull_request:
    branches: [develop, release]
  workflow_dispatch:

jobs:
  consumer-layers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer: [level3, level4, level5]
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install enterprise regression framework
        run: |
          python -m pip install --upgrade pip
          python -m pip install "git+${{ github.server_url }}/${{ github.repository_owner }}/enterprise-regression-platform.git"
      - name: Prepare producer sibling checkout and validate producer API
        run: |
          regauto checkout-build-run \
            --remote-url "${{ github.server_url }}/${{ github.repository_owner }}/regression-test-producer.git" \
            --branch "${{ github.head_ref || github.ref_name }}" \
            --gate "level2" \
            --workspace-root "$RUNNER_TEMP/regression-workspaces" \
            --directory-name regression-test-producer \
            --results-dir "$RUNNER_TEMP/regression-results/producer-level2" \
            --trigger github-actions
      - name: Checkout, build, and run consumer regression layer
        run: |
          regauto checkout-build-run \
            --remote-url "${{ github.server_url }}/${{ github.repository }}.git" \
            --branch "${{ github.head_ref || github.ref_name }}" \
            --gate "${{ matrix.layer }}" \
            --workspace-root "$RUNNER_TEMP/regression-workspaces" \
            --directory-name regression-test-consumer \
            --results-dir "$RUNNER_TEMP/regression-results/${{ matrix.layer }}" \
            --trigger github-actions
      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-${{ matrix.layer }}-results
          path: |
            ${{ runner.temp }}/regression-results/producer-level2
            ${{ runner.temp }}/regression-results/${{ matrix.layer }}
